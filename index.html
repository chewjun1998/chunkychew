<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chunky Chew | Pre-Order</title>
    
    <!-- External Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #4A76CF;
            --bg-cream: #FFFBF0;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Poppins', sans-serif;
            color: var(--brand-blue);
            font-weight: 500;
        }

        /* Poppins Bold for Headers */
        h1, h2, h3, .font-bold {
            font-weight: 700 !important;
        }

        /* Card Styling */
        .cookie-card {
            background: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(74, 118, 207, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 640px) {
            .cookie-card { flex-direction: row; align-items: center; }
        }

        .cookie-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(74, 118, 207, 0.1);
            border-color: var(--brand-blue);
        }

        /* Image Styling */
        .item-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f0f0;
        }

        @media (min-width: 640px) {
            .item-img { width: 140px; height: 140px; border-radius: 12px; margin: 12px; }
        }

        .btn-primary {
            background-color: var(--brand-blue);
            color: white;
            transition: all 0.3s;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--brand-blue);
            color: var(--brand-blue);
            font-size: 1.2rem;
            cursor: pointer;
            background: transparent;
        }

        .qty-btn:hover {
            background: var(--brand-blue);
            color: white;
        }

        input, textarea {
            background: white !important;
            border: 1.5px solid rgba(74, 118, 207, 0.15) !important;
            padding: 14px !important;
            border-radius: 12px !important;
            color: var(--brand-blue) !important;
        }

        /* Friday Only Calendar Theme */
        .flatpickr-day.selected {
            background: var(--brand-blue) !important;
            border-color: var(--brand-blue) !important;
        }

        #confirmation-screen { display: none; }

        .logo-box { max-width: 240px; margin: 0 auto; }
        .logo-img { width: 100%; height: auto; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="main-app" class="max-w-2xl mx-auto">
        
        <!-- Header (Logo Only, No Subhead) -->
        <header class="text-center mb-12">
            <div class="logo-box">
                <img src="logo.png" alt="Chunky Chew" class="logo-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/250x100?text=Chunky+Chew';">
            </div>
        </header>

        <!-- Menu Section with Photos -->
        <section class="mb-10">
            <h2 class="text-2xl mb-8 uppercase tracking-widest text-center border-b border-blue-100 pb-4">Our Menu</h2>
            <div class="space-y-6">
                
                <!-- Item 1: OG -->
                <div class="cookie-card rounded-3xl">
                    <img src="og.jpg" alt="OG Chunk" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=OG+Chunk';">
                    <div class="p-5 flex-grow flex items-center justify-between">
                        <div>
                            <h3 class="text-xl">OG Chunk</h3>
                            <p class="opacity-60 font-bold">RM 9.50</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="updateQty('og', -1)" class="qty-btn">−</button>
                            <span id="qty-og" class="text-xl font-bold w-4 text-center">0</span>
                            <button onclick="updateQty('og', 1)" class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

                <!-- Item 2: Nutella -->
                <div class="cookie-card rounded-3xl">
                    <img src="nutella.jpg" alt="Gooey Nutella" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=Nutella';">
                    <div class="p-5 flex-grow flex items-center justify-between">
                        <div>
                            <h3 class="text-xl">Gooey Nutella</h3>
                            <p class="opacity-60 font-bold">RM 11.00</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="updateQty('nutella', -1)" class="qty-btn">−</button>
                            <span id="qty-nutella" class="text-xl font-bold w-4 text-center">0</span>
                            <button onclick="updateQty('nutella', 1)" class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

                <!-- Item 3: Smores -->
                <div class="cookie-card rounded-3xl">
                    <img src="smores.jpg" alt="Toasty Smores" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=Smores';">
                    <div class="p-5 flex-grow flex items-center justify-between">
                        <div>
                            <h3 class="text-xl">Toasty S'mores</h3>
                            <p class="opacity-60 font-bold">RM 11.00</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="updateQty('smores', -1)" class="qty-btn">−</button>
                            <span id="qty-smores" class="text-xl font-bold w-4 text-center">0</span>
                            <button onclick="updateQty('smores', 1)" class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- Dynamic Summary Bar -->
        <div class="bg-white p-6 rounded-3xl mb-10 flex justify-between items-center shadow-sm border border-blue-50">
            <span class="text-sm uppercase tracking-widest opacity-50 font-bold">Order Subtotal</span>
            <span id="total-price" class="text-3xl font-bold">RM 0.00</span>
        </div>

        <!-- Details Form -->
        <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-blue-50">
            <h2 class="text-2xl mb-8 text-center uppercase tracking-widest">Pickup Details</h2>
            <form id="orderForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase mb-2">Name</label>
                    <input type="text" id="name" required class="w-full" placeholder="Enter your full name">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2">Phone</label>
                        <input type="tel" id="phone" required class="w-full" placeholder="012-3456789">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2">Email</label>
                        <input type="email" id="email" required class="w-full" placeholder="hello@email.com">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2">Pickup Date (Friday Only)</label>
                    <input type="text" id="pickup-date" placeholder="Select a Friday" required class="w-full bg-white cursor-pointer">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2">Special Instructions</label>
                    <textarea id="notes" rows="2" class="w-full" placeholder="Any specific notes for the baker?"></textarea>
                </div>

                <button type="submit" class="w-full btn-primary font-bold py-5 rounded-2xl text-lg mt-4 shadow-xl uppercase tracking-widest transform active:scale-95 transition-all">
                    Review Order Summary
                </button>
            </form>
        </section>

        <footer class="mt-16 text-center opacity-30 text-[10px] pb-12 uppercase tracking-[0.3em]">
            &copy; 2026 Chunky Chew
        </footer>
    </div>

    <!-- Confirmation Screen Overlay -->
    <div id="confirmation-screen" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <h2 class="text-4xl font-bold mb-8">Ready to Send?</h2>
            <div class="bg-[#F8F9FF] p-8 rounded-[2.5rem] text-left mb-8 border border-blue-50">
                <div id="conf-summary" class="space-y-4 mb-6 border-b border-blue-100 pb-6"></div>
                <div class="flex justify-between font-bold text-2xl mb-8">
                    <span>Total</span>
                    <span id="conf-total">RM 0.00</span>
                </div>
                <div class="p-4 bg-white rounded-2xl border border-blue-100">
                    <p class="text-[10px] uppercase font-bold opacity-40 mb-1">Friday Collection</p>
                    <p id="conf-date" class="font-bold text-lg"></p>
                </div>
            </div>
            
            <!-- WhatsApp Button updated to 0183661132 -->
            <button id="wa-btn" class="w-full bg-[#25D366] text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-lg hover:brightness-110">
                Send to WhatsApp
            </button>
            <button onclick="window.location.reload()" class="mt-8 text-xs font-bold opacity-30 underline uppercase tracking-widest">Go Back & Edit</button>
        </div>
    </div>

    <script>
        const menu = {
            og: { name: "OG Chunk", price: 9.50, qty: 0 },
            nutella: { name: "Gooey Nutella", price: 11.00, qty: 0 },
            smores: { name: "Toasty S'mores", price: 11.00, qty: 0 }
        };

        function updateQty(id, change) {
            const item = menu[id];
            if (item.qty + change >= 0) {
                item.qty += change;
                document.getElementById(`qty-${id}`).innerText = item.qty;
                const total = Object.values(menu).reduce((acc, i) => acc + (i.qty * i.price), 0);
                document.getElementById('total-price').innerText = `RM ${total.toFixed(2)}`;
            }
        }

        // FRIDAY (Day 5) Restriction
        flatpickr("#pickup-date", {
            minDate: "today",
            dateFormat: "l, d F Y",
            disableMobile: "true",
            "enable": [function(date) { return (date.getDay() === 5); }]
        });

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const total = Object.values(menu).reduce((acc, i) => acc + (i.qty * i.price), 0);
            if (total <= 0) return alert("Please select at least one chunky cookie to proceed!");

            document.getElementById('conf-total').innerText = `RM ${total.toFixed(2)}`;
            document.getElementById('conf-date').innerText = document.getElementById('pickup-date').value;

            let summaryHtml = '';
            let waItems = '';
            for (const key in menu) {
                if (menu[key].qty > 0) {
                    summaryHtml += `<div class="flex justify-between font-bold"><span>${menu[key].qty}x ${menu[key].name}</span><span>RM ${(menu[key].qty * menu[key].price).toFixed(2)}</span></div>`;
                    waItems += `%0A- ${menu[key].qty}x ${menu[key].name}`;
                }
            }
            document.getElementById('conf-summary').innerHTML = summaryHtml;
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('confirmation-screen').style.display = 'flex';
            window.scrollTo(0,0);

            document.getElementById('wa-btn').onclick = () => {
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const date = document.getElementById('pickup-date').value;
                const notes = document.getElementById('notes').value || "None";
                
                const msg = `*NEW CHUNKY CHEW ORDER*%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Pickup Friday:* ${date}%0A%0A*Items:*${waItems}%0A%0A*Total:* RM ${total.toFixed(2)}%0A%0A*Notes:* ${notes}`;
                
                // Target number: 60183661132
                window.open(`https://wa.me/60183661132?text=${msg}`, '_blank');
            };
        });
    </script>
</body>
</html>
